wantType:
  metadata:
    name: transit_search
    title: Transit Route Found
    description: |
      Searches for transit routes using Yahoo!路線情報 via the transit skill.
      Calls python3 ~/.mywant/custom-types/mywant-transit-plugin/main.py <from> <to> [time] [arrive_type].
      Empty optional args are filtered out automatically by do_mrs_agent.
      Completes after a single execution.
    version: '1.0'
    category: transit
    pattern: independent

  finalResultField: summary

  achievedWhen:
    field: status
    operator: "!="
    value: "pending"

  parameters:
    - name: from
      description: Departure station or location
      type: string
      required: true
      example: 新宿

    - name: to
      description: Destination station or location
      type: string
      required: true
      example: 渋谷

    - name: time
      description: Target time in HH:MM format (optional)
      type: string
      required: false
      default: ""
      example: "09:30"

    - name: arrive_type
      description: 到着 or 出発 (optional, used only when time is specified)
      type: string
      required: false
      default: ""
      example: "到着"

  state:
    - name: skill_timeout_seconds
      description: Max seconds to wait for the skill script to complete (default 120)
      type: int
      label: goal
      persistent: false
      initialValue: 120

    - name: skill_path
      description: Path to the MRS skill script (set by onInitialize)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: skill_args_keys
      description: Space-separated state field names used as positional CLI args (empty values filtered)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: mrs_raw_output
      description: Raw JSON output from the MRS skill (source for fetchFrom fields)
      type: object
      label: current
      persistent: false
      initialValue: null

    # ── パラメータコピー ──────────────────────────────────────────
    - name: from
      description: Departure location (copied from param)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: to
      description: Destination (copied from param)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: time
      description: Target time (copied from param)
      type: string
      label: current
      persistent: false
      initialValue: ""

    - name: arrive_type
      description: Arrive or depart (copied from param)
      type: string
      label: current
      persistent: false
      initialValue: ""

    # ── 実行ステータス ────────────────────────────────────────────
    - name: status
      description: Execution status (pending, done, failed)
      type: string
      label: current
      persistent: true
      initialValue: "pending"

    - name: error
      description: Error message if execution failed
      type: string
      label: current
      persistent: true
      initialValue: ""

    # ── スキルJSON全体 ────────────────────────────────────────────
    - name: raw_text
      description: Raw text output from the transit search
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "raw_text"

    # ── ルート0 (最初の推奨ルート) ────────────────────────────────
    - name: summary
      description: Summary of the first route (duration, transfers, fare)
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].summary"

    - name: duration_minutes
      description: Travel duration in minutes for the first route
      type: int
      label: current
      persistent: true
      initialValue: 0
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].duration_minutes"

    - name: fare
      description: Fare in yen for the first route
      type: int
      label: current
      persistent: true
      initialValue: 0
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].fare"

    - name: transfers
      description: Number of transfers for the first route
      type: int
      label: current
      persistent: true
      initialValue: 0
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].transfers"

    - name: departure
      description: Departure time of the first route (HH:MM)
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].departure"

    - name: arrival
      description: Arrival time of the first route (HH:MM)
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].arrival"

    - name: legs_text
      description: Human-readable route legs for the first route
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].legs_text"

    - name: first_line
      description: Name of the first transit line in the first route
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].legs[0].line"

    - name: first_direction
      description: Direction of the first transit line
      type: string
      label: current
      persistent: true
      initialValue: ""
      fetchFrom: mrs_raw_output
      onFetchData: "routes[0].legs[0].direction"

  onInitialize:
    current:
      status: "pending"
      skill_path: "~/.mywant/custom-types/mywant-transit-plugin/main.py"
      skill_args_keys: "from to time arrive_type"

  requires:
    - do_mrs_agent

  examples:
    - name: Simple Route Search
      description: Search transit route from Shinjuku to Shibuya
      want:
        metadata:
          name: shinjuku_to_shibuya
          type: transit_search
        spec:
          params:
            from: 新宿
            to: 渋谷

    - name: Route Search with Arrival Time
      description: Search route arriving at Shibuya by 09:30
      want:
        metadata:
          name: shinjuku_shibuya_arrival
          type: transit_search
        spec:
          params:
            from: 新宿
            to: 渋谷
            time: "09:30"
            arrive_type: 到着
